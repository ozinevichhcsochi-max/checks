<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Учёт чеков</title>
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--text:#172033;--muted:#667085;--line:#d9dee7;--accent:#1d4ed8;--danger:#b42318;--ok:#067647}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
    .wrap{max-width:980px;margin:auto;padding:16px 14px 40px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    h1{font-size:24px;margin:0}.badge{font-size:13px;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(16,24,40,.04)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px} input,textarea,button{font:inherit}
    input,textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:#fff;color:var(--text)} textarea{min-height:78px;resize:vertical}
    .btn{border:0;border-radius:11px;padding:12px 14px;font-weight:700;cursor:pointer}.primary{background:var(--accent);color:#fff}.secondary{background:#e9eefb;color:#173b8f}.ghost{background:#fff;border:1px solid var(--line)}.danger{background:#fff0ee;color:var(--danger)}
    .actions{display:flex;gap:9px;flex-wrap:wrap}.actions .btn{flex:1;min-width:150px}
    .file{position:relative;overflow:hidden}.file input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .status{font-size:14px;margin-top:10px;padding:10px;border-radius:10px;background:#f8fafc;color:var(--muted);display:none}.status.show{display:block}.status.ok{background:#ecfdf3;color:var(--ok)}.status.err{background:#fef3f2;color:var(--danger)}
    .preview{display:none;margin-top:10px}.preview img{max-width:100%;max-height:340px;border-radius:12px;border:1px solid var(--line)}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px} table{width:100%;border-collapse:collapse;min-width:730px;background:#fff} th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:9px;text-align:left;vertical-align:top} th:last-child,td:last-child{border-right:0} th{background:#f2f4f7;font-size:13px;position:sticky;top:0} td input{min-width:100px;padding:8px;border-radius:8px}.comment-input{min-width:260px}.sum{font-weight:800}.empty{text-align:center;color:var(--muted);padding:24px}
    .totals{display:flex;justify-content:flex-end;gap:18px;margin-top:10px;font-weight:700}.small{font-size:12px;color:var(--muted);line-height:1.45}.icon-btn{border:0;background:transparent;font-size:18px;cursor:pointer;padding:8px}
    @media(max-width:620px){.grid{grid-template-columns:1fr}.full{grid-column:auto}h1{font-size:21px}.actions .btn{min-width:100%}.wrap{padding:12px 10px 30px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>Учёт чеков</h1><div class="badge" id="countBadge">0 чеков</div></div>

  <section class="card">
    <div class="actions">
      <label class="btn primary file">📷 Сфотографировать чек<input id="cameraInput" type="file" accept="image/*" capture="environment"></label>
      <label class="btn secondary file">🖼 Выбрать фото<input id="galleryInput" type="file" accept="image/*"></label>
    </div>
    <div id="status" class="status"></div>
    <div id="preview" class="preview"><img id="previewImg" alt="Фото чека"></div>
    <p class="small">Сначала приложение ищет QR-код на чеке — это самый точный способ получить дату, сумму и ФД. Если QR не найден, запускается распознавание текста. Для работы распознавания и выгрузки Excel нужен интернет.</p>
  </section>

  <section class="card">
    <div class="grid">
      <div><label for="date">Дата покупки</label><input id="date" type="date"></div>
      <div><label for="fd">ФД</label><input id="fd" inputmode="numeric" placeholder="Например, 6419"></div>
      <div><label for="amount">Сумма, ₽</label><input id="amount" inputmode="decimal" placeholder="0,00"></div>
      <div class="full"><label for="comment">За что чек</label><textarea id="comment" placeholder="Например: Оплата сверхнормативного багажа на рейсе Москва–Сочи"></textarea></div>
    </div>
    <div class="actions" style="margin-top:10px">
      <button id="voiceBtn" class="btn ghost" type="button">🎙 Голосовой ввод комментария</button>
      <button id="addBtn" class="btn primary" type="button">Добавить чек</button>
    </div>
  </section>

  <section class="card">
    <div class="actions" style="margin-bottom:10px">
      <button id="exportBtn" class="btn primary" type="button">Сформировать отчёт Excel</button>
      <button id="csvBtn" class="btn secondary" type="button">Скачать CSV</button>
      <button id="clearBtn" class="btn danger" type="button">Очистить всё</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Дата</th><th>Чек (ФД)</th><th>Сумма</th><th>Комментарий</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="totals"><span>Чеков: <span id="totalCount">0</span></span><span>Итого: <span id="totalAmount">0,00 ₽</span></span></div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const els = {camera:$('cameraInput'),gallery:$('galleryInput'),status:$('status'),preview:$('preview'),previewImg:$('previewImg'),date:$('date'),fd:$('fd'),amount:$('amount'),comment:$('comment'),tbody:$('tbody'),totalCount:$('totalCount'),totalAmount:$('totalAmount'),countBadge:$('countBadge')};
  let receipts = JSON.parse(localStorage.getItem('receiptTrackerData') || '[]');

  const save = () => { localStorage.setItem('receiptTrackerData', JSON.stringify(receipts)); render(); };
  const money = n => Number(n||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₽';
  const isoDate = d => { if(!d) return ''; const m=d.match(/(\d{2})[.\/-](\d{2})[.\/-](\d{2,4})/); if(!m) return ''; let y=m[3]; if(y.length===2)y='20'+y; return `${y}-${m[2]}-${m[1]}`; };
  const displayDate = s => { if(!s)return ''; const [y,m,d]=s.split('-'); return `${d}.${m}.${y}`; };
  const parseAmount = v => Number(String(v).replace(/\s/g,'').replace(',','.').replace(/[^0-9.]/g,'')) || 0;
  function setStatus(text,type=''){els.status.textContent=text;els.status.className='status show '+type;}
  function clearStatus(){els.status.className='status';els.status.textContent='';}

  function render(){
    els.tbody.innerHTML='';
    if(!receipts.length){els.tbody.innerHTML='<tr><td colspan="5" class="empty">Добавленных чеков пока нет</td></tr>';}
    receipts.forEach((r,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td><input type="date" data-i="${i}" data-k="date" value="${r.date||''}"></td>
      <td><input inputmode="numeric" data-i="${i}" data-k="fd" value="${escapeHtml(r.fd||'')}"></td>
      <td><input inputmode="decimal" data-i="${i}" data-k="amount" value="${Number(r.amount||0).toFixed(2).replace('.',',')}"></td>
      <td><input class="comment-input" data-i="${i}" data-k="comment" value="${escapeHtml(r.comment||'')}"></td>
      <td><button class="icon-btn" data-del="${i}" title="Удалить">🗑</button></td>`;
      els.tbody.appendChild(tr);
    });
    const total=receipts.reduce((s,r)=>s+Number(r.amount||0),0);
    els.totalCount.textContent=receipts.length; els.totalAmount.textContent=money(total); els.countBadge.textContent=`${receipts.length} чеков`;
  }
  function escapeHtml(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  els.tbody.addEventListener('change',e=>{
    const i=Number(e.target.dataset.i); const k=e.target.dataset.k; if(Number.isNaN(i)||!k)return;
    receipts[i][k]=k==='amount'?parseAmount(e.target.value):e.target.value; save();
  });
  els.tbody.addEventListener('click',e=>{if(e.target.dataset.del!==undefined){receipts.splice(Number(e.target.dataset.del),1);save();}});

  async function handleImage(file){
    if(!file)return; clearStatus(); setStatus('Обрабатываю фотографию…');
    const url=URL.createObjectURL(file); els.previewImg.src=url; els.preview.style.display='block';
    try{
      const img=await loadImage(url); const qr=readQr(img);
      if(qr){ const parsed=parseFiscalQr(qr); fill(parsed); setStatus('QR-код считан. Проверьте данные и добавьте комментарий.','ok'); return; }
      setStatus('QR-код не найден. Распознаю текст чека…');
      if(!window.Tesseract) throw new Error('Модуль распознавания не загрузился');
      const result=await Tesseract.recognize(file,'rus+eng',{logger:m=>{if(m.status==='recognizing text')setStatus(`Распознаю текст: ${Math.round((m.progress||0)*100)}%`);}});
      const parsed=parseReceiptText(result.data.text||''); fill(parsed);
      setStatus('Текст распознан. Обязательно проверьте дату, ФД и сумму.','ok');
    }catch(err){setStatus('Не удалось распознать чек. Введите данные вручную. '+(err.message||''),'err');}
  }
  function loadImage(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src;});}
  function readQr(img){
    try{const max=1800,scale=Math.min(1,max/Math.max(img.naturalWidth,img.naturalHeight)); const c=document.createElement('canvas');c.width=Math.round(img.naturalWidth*scale);c.height=Math.round(img.naturalHeight*scale);const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(img,0,0,c.width,c.height);const d=x.getImageData(0,0,c.width,c.height);const code=window.jsQR&&jsQR(d.data,d.width,d.height,{inversionAttempts:'attemptBoth'});return code?code.data:null;}catch(e){return null;}
  }
  function parseFiscalQr(raw){
    let q=raw; try{q=decodeURIComponent(raw)}catch(e){}
    const params={}; q.split(/[?&]/).forEach(p=>{const [k,...v]=p.split('=');if(k&&v.length)params[k.toLowerCase()]=v.join('=');});
    let date=''; const t=params.t||''; const m=t.match(/(\d{4})(\d{2})(\d{2})T?/); if(m)date=`${m[1]}-${m[2]}-${m[3]}`;
    return {date,fd:params.i||params.fd||'',amount:parseAmount(params.s||params.sum||'')};
  }
  function parseReceiptText(text){
    const clean=text.replace(/\u00a0/g,' ');
    const fdMatch=clean.match(/(?:ФД|FD|ФПД)\s*[:№#-]?\s*(\d{3,12})/i);
    const dates=[...clean.matchAll(/\b(\d{2}[.\/-]\d{2}[.\/-]\d{2,4})\b/g)].map(m=>m[1]);
    const sumPatterns=[/(?:ИТОГ|ИТОГО|СУММА|TOTAL)\s*[:=]?\s*(\d[\d\s]*[,.]\d{2})/ig,/(\d[\d\s]*[,.]\d{2})\s*(?:₽|РУБ|RUB)/ig];
    let amounts=[]; sumPatterns.forEach(re=>{let m;while((m=re.exec(clean)))amounts.push(parseAmount(m[1]));});
    return {date:dates.length?isoDate(dates[0]):'',fd:fdMatch?fdMatch[1]:'',amount:amounts.length?Math.max(...amounts):0};
  }
  function fill(p){ if(p.date)els.date.value=p.date;if(p.fd)els.fd.value=p.fd;if(p.amount)els.amount.value=String(p.amount).replace('.',','); }

  [els.camera,els.gallery].forEach(inp=>inp.addEventListener('change',e=>{handleImage(e.target.files[0]);e.target.value='';}));
  $('addBtn').addEventListener('click',()=>{
    const item={date:els.date.value,fd:els.fd.value.trim(),amount:parseAmount(els.amount.value),comment:els.comment.value.trim()};
    if(!item.date&&!item.fd&&!item.amount&&!item.comment){setStatus('Заполните хотя бы одно поле.','err');return;}
    receipts.push(item);save();els.date.value='';els.fd.value='';els.amount.value='';els.comment.value='';els.preview.style.display='none';setStatus('Чек добавлен в таблицу.','ok');
  });

  $('voiceBtn').addEventListener('click',()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){els.comment.focus();setStatus('На этом устройстве отдельная кнопка распознавания недоступна. Используйте микрофон на клавиатуре iPhone.','err');return;}
    const r=new SR();r.lang='ru-RU';r.interimResults=false;r.onstart=()=>setStatus('Говорите…');r.onresult=e=>{els.comment.value+=(els.comment.value?' ':'')+e.results[0][0].transcript;setStatus('Текст добавлен.','ok');};r.onerror=()=>setStatus('Не удалось распознать речь. Используйте микрофон клавиатуры.','err');r.start();
  });

  $('exportBtn').addEventListener('click',()=>{
    if(!receipts.length){setStatus('Сначала добавьте чеки.','err');return;}
    if(!window.XLSX){setStatus('Модуль Excel не загрузился. Проверьте интернет.','err');return;}
    const rows=receipts.map(r=>({'дата':displayDate(r.date),'чек':r.fd,'сумма':Number(r.amount||0),'комментарий':r.comment}));
    rows.push({'дата':'','чек':'','сумма':receipts.reduce((s,r)=>s+Number(r.amount||0),0),'комментарий':'ИТОГО'});
    const ws=XLSX.utils.json_to_sheet(rows,{header:['дата','чек','сумма','комментарий']}); ws['!cols']=[{wch:13},{wch:14},{wch:14},{wch:55}];
    for(let i=2;i<=rows.length+1;i++){if(ws['C'+i])ws['C'+i].z='#,##0.00';}
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Авансовый отчет');XLSX.writeFile(wb,`Авансовый_отчет_${new Date().toISOString().slice(0,10)}.xlsx`);
  });
  $('csvBtn').addEventListener('click',()=>{
    if(!receipts.length){setStatus('Сначала добавьте чеки.','err');return;}
    const esc=s=>'"'+String(s??'').replace(/"/g,'""')+'"';
    const lines=[['дата','чек','сумма','комментарий'].map(esc).join(';'),...receipts.map(r=>[displayDate(r.date),r.fd,Number(r.amount||0).toFixed(2).replace('.',','),r.comment].map(esc).join(';'))];
    const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Авансовый_отчет_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href);
  });
  $('clearBtn').addEventListener('click',()=>{if(confirm('Удалить все сохранённые чеки?')){receipts=[];save();}});
  render();
})();
</script>
</body>
</html>
